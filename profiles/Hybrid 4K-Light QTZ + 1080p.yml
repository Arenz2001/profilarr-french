name: Hybrid 4K-Light QTZ + 1080p
description: "Profil Radarr hybride 4K/1080p avec priorité absolue sur les releases\
  \ QTZ.\n\nLogique :\n- Si une release QTZ est disponible (en 4K-light ou autre),\
  \ elle est toujours choisie en priorité, quelle que soit la qualité des autres releases.\n\
  - En l'absence de QTZ, le profil tombe en fallback sur les meilleures releases\
  \ 1080p disponibles selon les tiers habituels.\n- Les releases 4K d'autres équipes\
  \ ne sont pas priorisées (pas de score UHD Bluray Tier inclus).\n\nPour les multiples\
  \ versions QTZ (ex : 4K-light en plusieurs bitrates), activer 'Prefer Larger\
  \ Files' dans les paramètres Radarr pour que la version la plus lourde\
  \ (meilleur codec) soit choisie automatiquement.\n\nSe base sur les TRaSH Guides\
  \ adaptés aux équipes françaises."
