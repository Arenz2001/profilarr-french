name: Anime - TsundereRaws Priority
description: "Profil Sonarr spécifique pour les animes avec priorité absolue sur\
  \ TsundereRaws.\n\nLogique :\n- Si TsundereRaws est disponible, il est toujours\
  \ choisi en priorité, même face à une release de meilleure qualité apparente\
  \ (Remux, Bluray, etc.).\n- En l'absence de TsundereRaws, le profil utilise les\
  \ tiers d'équipes anime françaises habituels pour choisir la meilleure release.\n\
  \nSe base sur les TRaSH Guides adaptés aux équipes françaises."
